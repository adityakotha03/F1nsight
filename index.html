    <script>
      // Global tracking shim to send events to Google Analytics
      window.trackButtonClick = function (event) {
        console.log("[Analytics] Track:", event);
        if (typeof gtag === "function") {
          gtag("event", "click", {
            event_category: "Interaction",
            event_label: event,
          });
        }
      };
    </script>
